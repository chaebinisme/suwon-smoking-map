<!DOCTYPE html>
<html>
<head>
  <title>Suwon Station Smoking Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #000000;
    }

    .header {
      padding: 40px 20px 30px;
      border-bottom: 2px solid #000;
      text-align: center;
    }

    /* 🐸 수원이 캐릭터 스타일 */
    .mascot {
      width: 120px;
      height: auto;
      margin-bottom: 10px;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      margin-top: 10px;
      color: #555;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .notice {
      border: 2px solid #000;
      padding: 25px;
      margin-bottom: 35px;
      text-align: center;
    }

    .notice strong {
      display: block;
      font-size: 22px;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .notice span {
      font-size: 14px;
      color: #555;
    }

    .map {
      border: 2px solid #000;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    /* 🚬 꽁초 애니메이션 */
    .cigarette {
      position: fixed;
      top: -50px;
      font-size: 18px;
      animation: fall 2s linear forwards;
      pointer-events: none;
      opacity: 0.8;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* 📱 모바일 */
    @media (max-width: 600px) {

      .header {
        padding: 25px 15px;
      }

      /* 모바일에서는 캐릭터 크기를 살짝 줄임 */
      .mascot {
        width: 90px;
      }

      .title {
        font-size: 22px;
      }

      .container {
        padding: 15px;
      }

      .notice {
        padding: 20px;
      }

      .notice strong {
        font-size: 20px;
      }

      iframe {
        height: 380px;
      }

    }

  </style>
</head>

<body>

<div class="header">
  <img src="수원이.png" alt="수원이" class="mascot">
  <div class="title">SUWON STATION</div>
  <div class="subtitle">흡연구역 안내 시스템</div>
</div>

<div class="container">

  <div class="notice">
    <strong>🚭 이 골목은 금연구역입니다</strong>
    <span>지정된 흡연구역을 이용해주세요.</span>
  </div>

  <div class="map">
    <iframe 
      src="https://www.google.com/maps/d/u/0/embed?mid=1dfK79nmDlIo-XPiK0v9GV7QnEL7EJpc&ehbc=2E312F&noprof=1">
    </table>
    </iframe>
  </div>

  <div class="footer">
    수원역 인근 흡연구역 안내
  </div>

</div>

<script>
function createCigarette() {
  const el = document.createElement("div");
  el.className = "cigarette";
  el.innerText = "🚬";

  el.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 2000);
}

document.addEventListener("DOMContentLoaded", function() {
  for (let i = 0; i < 7; i++) {
    setTimeout(createCigarette, i * 200);
  }
});
</script>

</body>
</html>
