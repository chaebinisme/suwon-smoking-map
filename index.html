  <title>Suwon Station Smoking Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #000000;
    }

    /* 🐸 수원이와 타이틀을 가로로 정렬하기 위한 헤더 스타일 수정 */
    .header {
      padding: 40px 20px 30px;
      border-bottom: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px; /* 캐릭터와 글자 사이의 간격 */
    }

    /* 글자 영역을 묶어주는 컨테이너 */
    .title-group {
      text-align: left; /* 캐릭터 옆에 있으므로 왼쪽 정렬이 자연스럽습니다 */
    }

    /* 🐸 수원이 캐릭터 스타일 (문장 옆에 맞게 크기 최적화) */
    .mascot {
      width: 80px;
      height: auto;
      display: block;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 14px;
      margin-top: 5px;
      color: #555;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .notice {
      border: 2px solid #000;
      padding: 25px;
      margin-bottom: 35px;
      text-align: center;
    }

    .notice strong {
      display: block;
      font-size: 22px;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .notice span {
      font-size: 14px;
      color: #555;
    }

    .map {
      border: 2px solid #000;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
      display: block;
    }

    /* 🏢 하단 푸터 및 수원시 로고 스타일 */
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px dashed #ccc;
      text-align: center;
    }

    .footer-text {
      font-size: 13px;
      color: #555;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .suwon-logo {
      width: 140px;
      height: auto;
      opacity: 0.85;
    }

    /* 🚬 꽁초 애니메이션 */
    .cigarette {
      position: fixed;
      top: -50px;
      font-size: 18px;
      animation: fall 2s linear forwards;
      pointer-events: none;
      opacity: 0.8;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* 📱 모바일 반응형 */
    @media (max-width: 600px) {
      .header {
        padding: 25px 15px;
        gap: 10px;
      }

      .mascot {
        width: 60px; /* 모바일에서는 옆에 놓였을 때 안 가려지도록 캐릭터를 조금 더 축소 */
      }

      .title {
        font-size: 20px;
      }

      .container {
        padding: 15px;
      }

      .notice {
        padding: 20px;
      }

      .notice strong {
        font-size: 20px;
      }

      iframe {
        height: 380px;
      }

      .footer {
        margin-top: 30px;
      }

      .suwon-logo {
        width: 110px;
      }
    }
  </style>
</head>

 
  
<body>

<div class="header">
  <img src="suwon.png" alt="수원이 마스코트" class="mascot">
  
  <div class="title-group">
    <div class="title">수원역 흡연구역 안내</div>
    <div class="subtitle">Suwon Station Smoking Areas</div>
  </div>
</div>

<div class="container">

  <div class="notice">
    <strong>🚭 이 골목은 금연구역입니다</strong>
    <span>지정된 흡연구역을 이용해주세요.</span>
  </div>

  <div class="map">
    <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1dfK79nmDlIo-XPiK0v9GV7QnEL7EJpc&ehbc=2E312F&noprof=1"></iframe>
  </div>

  <div class="footer">
    <div class="footer-text">수원역 인근 흡연구역 안내</div>
    <img src="suwon_logo.png" alt="수원특례시" class="suwon-logo">
  </div>

</div>

<script>
function createCigarette() {
  const el = document.createElement("div");
  el.className = "cigarette";
  el.innerText = "🚬";
  el.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 2000);
}
document.addEventListener("DOMContentLoaded", function() {
  for (let i = 0; i < 7; i++) {
    setTimeout(createCigarette, i * 200);
  }
});
</script>

</body>
