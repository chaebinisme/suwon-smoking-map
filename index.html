<!DOCTYPE html>
<html>
<head>
  <title>Suwon Smoking Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #000;
    }

    .header {
      padding: 40px 20px;
      border-bottom: 1px solid #000;
      text-align: center;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .notice {
      border: 1px solid #000;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
    }

    /* 🔥 모바일 전용 */
    @media (max-width: 600px) {

      .title {
        font-size: 20px;
      }

      .header {
        padding: 25px 15px;
      }

      .container {
        padding: 15px;
      }

      iframe {
        height: 400px;
      }

      .notice {
        font-size: 13px;
      }

    }

  </style>
</head>

<body>

<div class="header">
  <div class="title">SUWON SMOKING MAP</div>
</div>

<div class="container">

  <div class="notice">
    🚭 이 골목은 금연구역입니다<br>
    지정된 흡연구역을 이용해주세요.
  </div>

  <iframe 
    src="https://www.google.com/maps/d/u/0/embed?mid=1dfK79nmDlIo-XPiK0v9GV7QnEL7EJpc&ehbc=2E312F&noprof=1">
  </iframe>

  <div class="footer">
    가장 가까운 흡연구역으로 이동하세요
  </div>

</div>

</body>
</html>
