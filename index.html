<!DOCTYPE html>
<html>
<head>
  <title>Suwon Smoking Map</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #ffffff;
      color: #000000;
    }

    .header {
      padding: 40px 20px 20px;
      border-bottom: 1px solid #000;
      text-align: center;
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      margin-top: 8px;
      color: #555;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .notice {
      border: 1px solid #000;
      padding: 15px;
      margin-bottom: 25px;
      font-size: 14px;
      line-height: 1.6;
    }

    .notice strong {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .map {
      border: 1px solid #000;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #555;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="header">
  <h1 class="title">SUWON SMOKING MAP</h1>
  <p class="subtitle">수원역 로데오거리 흡연구역 안내</p>
</div>

<div class="container">

  <div class="notice">
    <strong>🚭 이 골목은 금연구역입니다</strong>
    지정된 흡연구역을 이용해주세요.
  </div>

  <div class="map">
    <iframe 
      src="https://www.google.com/maps/d/u/0/embed?mid=1dfK79nmDlIo-XPiK0v9GV7QnEL7EJpc&ehbc=2E312F&noprof=1">
    </iframe>
  </div>

  <div class="footer">
    가장 가까운 흡연구역으로 이동하세요
  </div>

</div>

</body>
</html>
